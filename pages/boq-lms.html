<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>BOQ LMS Reader</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

button{
padding:8px 14px;
margin-right:10px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

th{
background:#eee;
}

#progressBox{
width:100%;
background:#ddd;
height:25px;
border-radius:5px;
overflow:hidden;
margin-top:10px;
}

#progressBar{
height:100%;
width:0%;
background:#4CAF50;
color:white;
text-align:center;
line-height:25px;
}

.uploadBox{
margin-bottom:15px;
}

</style>

</head>

<body>

<h2>BOQ LMS Reader</h2>

<div class="uploadBox">

<b>Upload PDF</b><br>
<input type="file" id="pdfFiles" multiple accept=".pdf">

</div>

<div class="uploadBox">

<b>Upload Excel</b><br>
<input type="file" id="excelFile" accept=".xlsx,.xls">

</div>

<br>

<button onclick="processPDFs()">Proses PDF</button>
<button onclick="processExcel()">Proses Excel</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="progressBox">
<div id="progressBar">0%</div>
</div>

<p id="statusText"></p>

<table id="resultTable">

<thead>
<tr>
<th>Project</th>
<th>No WO</th>
<th>Tanggal</th>
<th>No</th>
<th>Item</th>
<th>Qty</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script src="../js/boq-lms.js"></script>

</body>
</html>
