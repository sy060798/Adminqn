<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOQ LMS Processor</title>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:900px;
    margin:auto;
}
button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}
#status{
    margin-top:10px;
    font-weight:bold;
    color:blue;
}
</style>
</head>

<body>

<div class="container">

<h2>BOQ LMS PROCESSOR</h2>

<input type="file" id="boqFile"><br>
<input type="file" id="lmsFiles" multiple><br>

<!-- ❗ HAPUS onclick -->
<button id="btnProcess">🔄 PROSES</button>
<button id="btnDownload">⬇ DOWNLOAD</button>

<div id="status">Belum ada proses</div>

</div>

<!-- JS UTAMA -->
<script src="../js/boq-lms.js"></script>

<!-- 🔥 PENGHUBUNG -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    const btnProcess = document.getElementById("btnProcess");
    const btnDownload = document.getElementById("btnDownload");

    btnProcess.addEventListener("click", function(){
        if(typeof processFiles === "function"){
            processFiles();
        }else{
            alert("JS tidak terbaca!");
        }
    });

    btnDownload.addEventListener("click", function(){
        if(typeof downloadBOQ === "function"){
            downloadBOQ();
        }else{
            alert("JS tidak terbaca!");
        }
    });

});
</script>

</body>
</html>
