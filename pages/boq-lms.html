<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOQ Auto Rekap LMS</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>

<body>

<div class="container">

<h2>BOQ Auto Rekap LMS</h2>

<label>Upload BOQ</label><br>
<input type="file" id="boqFile" accept=".xlsx,.xls">

<br><br>

<label>Upload File LMS (bisa banyak)</label><br>
<input type="file" id="lmsFiles" multiple accept=".xlsx,.xls">

<br><br>

<button onclick="processFiles()">Proses Data</button>
<button onclick="downloadBOQ()">Download BOQ</button>

<div class="progress">
<div id="progressBar" class="progress-bar">0%</div>
</div>

<p id="status">Menunggu upload file...</p>

</div>

<!-- JS harus naik folder -->

<script src="../js/boq-lms.js"></script>

</body>
</html>
