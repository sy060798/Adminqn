<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOQ LMS PROCESSOR</title>

<!-- XLSX LIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:900px;
    margin:auto;
}
h2{
    text-align:center;
}
input{
    margin:5px 0;
}
button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}
#status{
    margin-top:10px;
    font-weight:bold;
    color:blue;
}
</style>

</head>

<body>

<div class="container">

<h2>BOQ LMS PROCESSOR</h2>

<label>Upload BOQ Template:</label><br>
<input type="file" id="boqFile" accept=".xlsx,.xls"><br>

<label>Upload File LMS (bisa banyak):</label><br>
<input type="file" id="lmsFiles" multiple accept=".xlsx,.xls"><br>

<button onclick="processFiles()">🔄 PROSES</button>
<button onclick="downloadBOQ()">⬇ DOWNLOAD EXCEL</button>

<div id="status">Belum ada proses</div>

</div>

<!-- 🔥 PENTING: PATH HARUS BENAR -->
<script src="boq-lms.js" defer></script>

</body>
</html>
