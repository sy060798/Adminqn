<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOQ LMS Updater</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 40px;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      max-width: 900px;
      margin: auto;
    }

    h2 {
      margin-top: 0;
    }

    input {
      margin-bottom: 10px;
    }

    button {
      padding: 10px 18px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 10px;
    }

    button:hover {
      background: #1a5ed8;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>BOQ LMS Updater</h2>

    <p><b>Upload BOQ Template</b></p>
    <input type="file" id="boqFile" accept=".xlsx,.xls">

    <p><b>Upload File LMS (boleh banyak)</b></p>
    <input type="file" id="lmsFiles" accept=".xlsx,.xls" multiple>

    <br>

    <button onclick="processFiles()">Proses Update BOQ</button>
    <button onclick="downloadBOQ()">Download BOQ</button>

    <p id="status">Menunggu file...</p>

  </div>

  <script src="../js/boq-lms.js"></script>

</body>
</html>
