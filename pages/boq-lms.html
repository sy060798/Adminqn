<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOQ LMS Processor</title>

<!-- XLSX WAJIB -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:900px;
    margin:auto;
}
button{
    padding:10px;
    margin:5px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
}
button:hover{
    background:#0056b3;
}
#status{
    margin-top:10px;
    font-weight:bold;
    color:blue;
}
</style>

</head>

<body>

<div class="container">

<h2>BOQ LMS PROCESSOR</h2>

<!-- INPUT -->
<input type="file" id="boqFile" accept=".xlsx,.xls"><br>
<input type="file" id="lmsFiles" multiple accept=".xlsx,.xls"><br>

<!-- BUTTON (PAKAI ID, BUKAN onclick) -->
<button id="btnProcess">🔄 PROSES</button>
<button id="btnDownload">⬇ DOWNLOAD</button>

<div id="status">Belum ada proses</div>

</div>

<!-- JS -->
<script src="js/boq-lms.js"></script>

<!-- 🔥 PENTING: CONNECT BUTTON KE JS -->
<script>
document.getElementById("btnProcess").addEventListener("click", function(){
    if(typeof processFiles === "function"){
        processFiles();
    }else{
        alert("JS belum kebaca!");
    }
});

document.getElementById("btnDownload").addEventListener("click", function(){
    if(typeof downloadBOQ === "function"){
        downloadBOQ();
    }else{
        alert("JS belum kebaca!");
    }
});
</script>

</body>
</html>
