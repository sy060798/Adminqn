<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summary Maintenance (MT)</title>

<!-- ✅ PATH SESUAI STRUKTUR -->
<link rel="stylesheet" href="../style.css">

<!-- ✅ XLSX HARUS DI ATAS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f7f7f7;
}

.table-wrapper{
    width:100%;
    overflow-x:auto;
}

button{
    padding:8px 14px;
    margin-right:10px;
    cursor:pointer;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:4px;
}

button:hover{
    background:#1b5dc7;
}

table{
    border-collapse: collapse;
    min-width:1400px;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
    text-align:left;
    vertical-align:top;
}

th{
    background:#f0f0f0;
    white-space:nowrap;
}

td:nth-child(7){
    max-width:250px;
    white-space:normal;
}

td:last-child{
    max-width:400px;
    white-space:pre-line;
    word-break:break-word;
}
</style>

</head>

<body>

<h2>Summary Maintenance (MT)</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br><br>

<!-- ❌ HAPUS onclick -->
<button type="button" id="btnProcess">Proses Data</button>
<button type="button" id="btnDownload">Download Hasil</button>

<div class="table-wrapper">
<table id="resultTable">

<thead>
<tr>
<th>Dispatch</th>
<th>Status</th>
<th>No WO</th>
<th>Customer Name</th>
<th>ID</th>
<th>Tanggal</th>
<th>Alamat</th>
<th>Cabang</th>
<th>New ONT</th>
<th>Old ONT</th>
<th>Splicing</th>
<th>RFO</th>
<th>Action</th>
<th>Precon</th>
<th>Report</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<!-- ✅ JS -->
<script src="../js/summary-mt.js" defer></script>

<!-- ✅ FIX: PASTIKAN BUTTON KEHUBUNG -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    document.getElementById("btnProcess").addEventListener("click", function(){
        if(typeof processExcel === "function"){
            processExcel();
        } else {
            alert("JS belum kebaca!");
        }
    });

    document.getElementById("btnDownload").addEventListener("click", function(){
        if(typeof downloadExcel === "function"){
            downloadExcel();
        } else {
            alert("JS belum kebaca!");
        }
    });

});
</script>

</body>
</html>
