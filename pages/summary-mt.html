<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summary Maintenance (MT)</title>

<!-- ✅ PATH BENAR (karena di /pages/) -->
<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f7f7f7;
}

button{
    padding:8px 14px;
    margin-right:10px;
    cursor:pointer;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:4px;
}

button:hover{
    background:#1b5dc7;
}

table{
    border-collapse: collapse;
    width:100%;
    margin-top:20px;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
    text-align:left;
}

th{
    background:#f0f0f0;
}

td:nth-child(6){
    max-width:300px;
    white-space:normal;
}

td:last-child{
    white-space:pre-line;
    max-width:500px;
    word-break:break-word;
}
</style>

</head>

<body>

<h2>Summary Maintenance (MT)</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br><br>

<button type="button" onclick="processExcel()">Proses Data</button>
<button type="button" onclick="downloadExcel()">Download Hasil</button>

<table id="resultTable">

<thead>
<tr>
<th>Dispatch</th>
<th>Status</th>
<th>No WO</th>
<th>Customer Name</th>
<th>ID</th>
<th>Tanggal</th>
<th>Alamat</th>
<th>Cabang</th>
<th>New ONT</th>
<th>Old ONT</th>
<th>Splicing</th>
<th>RFO</th>
<th>Action</th>
<th>Precon</th>
<th>Report</th>
</tr>
</thead>

<tbody></tbody>

</table>

<!-- ✅ JS -->
<script src="../js/summary-mt.js" defer></script>

</body>
</html>
