<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summary Maintenance (MT)</title>

<link rel="stylesheet" href="/style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
padding:20px;
background:#f7f7f7;
}

h2{
margin-bottom:15px;
}

button{
padding:8px 14px;
margin-right:10px;
cursor:pointer;
background:#2c7be5;
color:white;
border:none;
border-radius:4px;
}

button:hover{
background:#1b5dc7;
}

table{
border-collapse: collapse;
width:100%;
margin-top:20px;
background:white;
}

th, td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
vertical-align:top;
}

th{
background:#f0f0f0;
text-align:left;
color:#000;
font-weight:bold;
}

tr:nth-child(even){
background:#fafafa;
}

.report{
max-width:600px;
word-break:break-word;
white-space:pre-line;
}

</style>

</head>

<body>

<main>

<h2>Summary Maintenance (MT)</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br><br>

<button onclick="processExcel()">Proses Data</button>
<button onclick="downloadExcel()">Download Hasil</button>

<table id="resultTable">

<thead>

<tr>
<th>dispatch</th>
<th>status</th>
<th>wo</th>
<th>id</th>
<th>tanggal</th>
<th>alamat</th>
<th>New ont</th>
<th>splacing</th>
<th>rfo</th>
<th>action</th>
<th>precon</th>
<th>report</th>
</tr>

</thead>

<tbody>
</tbody>

</table>

</main>

<script src="/js/summary-mt.js"></script>

</body>
</html>
