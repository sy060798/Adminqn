<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MyRep Summary Generator</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../js/myrep-summary.js" defer></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:40px;
}

.container{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h2{
margin-bottom:20px;
}

button{
padding:10px 18px;
margin-top:10px;
margin-right:10px;
cursor:pointer;
border:none;
background:#2c7be5;
color:#fff;
border-radius:5px;
font-weight:bold;
}

button:hover{
background:#1a5fd1;
}

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
text-align:left;
}

th{
background:#2c3e50;
color:#fff;
}

#progress{
margin-top:15px;
font-size:13px;
color:#555;
}
</style>

</head>

<body>

<div class="container">

<h2>MyRep Payment → Summary</h2>

<input type="file" id="fileInput" accept=".xlsx,.xls">

<br>

<button onclick="processFile()">Proses File</button>
<button onclick="downloadExcel()">Download Summary</button>

<div id="progress"></div>

<table id="resultTable">
<thead>
<tr>
<th>CUSTOMER ID</th>
<th>CUSTOMER NAME</th>
<th>WO ID</th>
<th>WO DATE SCHEDULING</th>
<th>BAST ID</th>
<th>BAST DATE</th>
<th>SERIAL NUMBER</th>
<th>MAC ADDRESS</th>
<th>Status</th>
<th>Ket</th>
<th>AREA</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</body>
</html>
