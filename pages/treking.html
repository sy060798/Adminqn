<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TREKING</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
h1{text-align:center;}
.container{background:white;padding:20px;border-radius:10px;max-width:1100px;margin:auto;}
input,select,button{padding:8px;margin:5px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ddd;padding:8px;}
th{background:#333;color:white;}
.status{margin-top:10px;font-weight:bold;color:blue;}
.total{margin-top:10px;font-weight:bold;}
button{cursor:pointer;}
</style>
</head>

<body>

<h1>TREKING</h1>

<div class="container">

<input type="file" id="upload" accept=".xlsx,.xls">

<br>

<select id="sheetSelect">
<option value="">-- PILIH SHEET --</option>
</select>

<br>

<input type="text" id="kotaInput" placeholder="Ketik Kota (contoh: Bali)">
<input type="text" id="periodeInput" placeholder="Ketik Periode (contoh: OKTOBER)">

<br>

<button id="btnScan">🔄 SCAN DATA</button>
<button id="btnExport">⬇ DOWNLOAD EXCEL</button>

<div class="status" id="status">Belum ada file</div>
<div class="total" id="total"></div>

<table>
<thead>
<tr>
<th>KOTA</th>
<th>PERIODE</th>
<th>NOMOR INVOICE</th>
<th>DPP</th>
<th>TGL PEMBAYARAN</th>
<th>PEMBAYARAN</th>
<th>SISA</th>
</tr>
</thead>
<tbody id="result">
<tr><td colspan="7" style="text-align:center;">Belum ada data</td></tr>
</tbody>
</table>

</div>

<script src="treking.js"></script>

</body>
</html>
