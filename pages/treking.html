<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>TREKING</title>

<link rel="stylesheet" href="../style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:1000px;
    margin:auto;
}
select, button, input{
    padding:8px;
    margin:5px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th, td{
    border:1px solid #ddd;
    padding:8px;
}
th{
    background:#333;
    color:white;
}
.total{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1 style="text-align:center;">TREKING</h1>

<div class="container">

<input type="file" id="upload" />

<br>

<select id="sheetSelect"></select>

<select id="kotaSelect" multiple size="5"></select>

<select id="periodeSelect" multiple size="5"></select>

<br>

<button onclick="applyFilter()">🔍 TAMPILKAN DATA</button>
<button onclick="exportExcel()">⬇ Export Excel</button>

<div class="total" id="total"></div>

<table>
<thead>
<tr>
<th>KOTA</th>
<th>PERIODE</th>
<th>NOMOR INVOICE</th>
<th>DPP</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>

</div>

<script src="../js/treking.js"></script>

</body>
</html>
