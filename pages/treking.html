<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREKING</title>

    <link rel="stylesheet" href="../style.css">

    <!-- XLSX -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 1000px;
            margin: auto;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
        }

        /* 🔥 biar rapi sejajar */
        .row-flex {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        /* 🔥 checkbox style */
        .filter-box {
            border: 1px solid #ccc;
            padding: 6px 10px;
            border-radius: 6px;
            background: #fafafa;
        }

        .filter-box label {
            margin-right: 10px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            white-space: nowrap;
        }

        th {
            background: #333;
            color: white;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
            color: blue;
        }

        .total {
            margin-top: 10px;
            font-weight: bold;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>TREKING</h1>

    <div class="container">

        <!-- Upload -->
        <input type="file" id="upload" accept=".xlsx,.xls">
        <br>

        <!-- 🔥 Pilih Sheet + Tahun + Filter -->
        <div class="row-flex">
            <select id="sheetSelect">
                <option value="">-- PILIH SHEET --</option>
            </select>

            <!-- 🔥 FILTER TAHUN (AUTO DARI EXCEL) -->
            <select id="tahunSelect">
                <option value="">-- PILIH TAHUN --</option>
            </select>

            <!-- 🔥 CHECKBOX TIPE -->
            <div class="filter-box">
                <label>
                    <input type="checkbox" class="tipeCheck" value="proforma" checked>
                    PROFORMA
                </label>
                <label>
                    <input type="checkbox" class="tipeCheck" value="invoice" checked>
                    INVOICE
                </label>
            </div>
        </div>
        <br>

        <!-- Filter -->
        <input type="text" id="kotaInput" placeholder="Ketik Kota (contoh: Bali)">
        <input type="text" id="periodeInput" placeholder="Ketik Periode (contoh: OKTOBER)">
        <br>

        <!-- Button -->
        <button id="btnScan">🔄 SCAN DATA</button>
        <button id="btnExport">⬇ DOWNLOAD EXCEL</button>

        <!-- Status -->
        <div class="status" id="status">Belum ada file</div>
        <div class="total" id="total"></div>

        <!-- TABLE -->
        <table>
            <thead>
               <tr>
                    <th>KOTA</th>
                    <th>PERIODE</th>
                    <th>NOMOR INVOICE</th>
                    <th>DPP</th>
                    <th style="background:#555;">TOTAL PROFORMA</th>
                    <th style="background:#444;">TOTAL INVOICE</th>
                    <th>TGL PEMBAYARAN</th>
                    <th>PEMBAYARAN</th>
                </tr>
            </thead>
            <tbody id="result">
                <tr>
                    <td colspan="8" style="text-align:center;">
                        Belum ada data
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <!-- JS UTAMA -->
    <script src="../js/treking.js" defer></script>

    <!-- fallback -->
    <script>
        if (!window.FileReader) {
            alert("Browser tidak support upload Excel");
        }
    </script>

</body>
</html>
