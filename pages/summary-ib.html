<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summary IB</title>

<link rel="stylesheet" href="../style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f7f7f7;
}

/* 🔥 WRAPPER BIAR GAK PECAH */
.table-wrapper{
    width:100%;
    overflow-x:auto;
    border:1px solid #ddd;
    background:white;
}

/* 🔥 BUTTON */
button{
    padding:8px 14px;
    margin-right:10px;
    cursor:pointer;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:4px;
}

button:hover{
    background:#1b5dc7;
}

/* 🔥 TABLE */
table{
    border-collapse: collapse;
    min-width:1300px;
    width:100%;
}

/* 🔥 HEADER HITAM */
th{
    background:#000 !important;
    color:#fff !important;
    white-space:nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
}

/* 🔥 CELL */
th, td{
    border:1px solid #ddd;
    padding:8px;
    font-size:13px;
    text-align:left;
    vertical-align:top;
}

/* 🔥 ZEBRA */
tr:nth-child(even){
    background:#fafafa;
}

/* 🔥 KOLOM PANJANG */
td:nth-child(6){ /* alamat */
    max-width:250px;
    white-space:normal;
}

td:last-child{ /* report */
    max-width:400px;
    white-space:pre-line;
    word-break:break-word;
}
</style>

</head>

<body>

<h2>Summary Installation Baru (IB)</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<br><br>

<!-- ❌ HAPUS onclick -->
<button type="button" id="btnProcess">Proses Data</button>
<button type="button" id="btnDownload">Download Hasil</button>

<br><br>

<div class="table-wrapper">
<table id="resultTable">

<thead>
<tr>
<th>Dispatch</th>
<th>Status</th>
<th>No WO</th>
<th>Customer Name</th>
<th>Tanggal</th>
<th>Alamat</th>
<th>ONT</th>
<th>STB</th>
<th>Router</th>
<th>Precon</th>
<th>Report</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<script src="../js/summary-ib.js" defer></script>

<!-- ✅ FIX BUTTON -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    const btnProcess = document.getElementById("btnProcess");
    const btnDownload = document.getElementById("btnDownload");

    btnProcess.addEventListener("click", function(){
        if(!document.getElementById("excelFile").files.length){
            alert("Pilih file Excel dulu!");
            return;
        }

        if(typeof processExcel === "function"){
            processExcel();
        } else {
            alert("JS belum kebaca!");
        }
    });

    btnDownload.addEventListener("click", function(){
        if(typeof downloadExcel === "function"){
            downloadExcel();
        } else {
            alert("JS belum kebaca!");
        }
    });

});
</script>

</body>
</html>
