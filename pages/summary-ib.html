<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summary IB</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
padding:20px;
background:#f7f7f7;
}

h2{
margin-bottom:20px;
}

button{
padding:8px 14px;
margin-top:10px;
margin-right:10px;
cursor:pointer;
border:none;
background:#2c7be5;
color:white;
border-radius:4px;
}

button:hover{
background:#1a68d1;
}

table{
border-collapse: collapse;
width:100%;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:14px;
text-align:left;
}

th{
background:#f0f0f0;
}

input[type="file"]{
padding:6px;
}

</style>

</head>

<body>

<main>

<h2>Summary Installation Baru (IB)</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls" required>

<br><br>

<button type="button" onclick="processExcel()">Proses Data</button>
<button type="button" onclick="downloadExcel()">Download Hasil</button>

<table id="resultTable">

<thead>
<tr>
<th>Status</th>
<th>No WO</th>
<th>Tanggal</th>
<th>Alamat</th>
<th>ONT</th>
<th>STB</th>
<th>Router</th>
<th>PRECON</th>
<th>Report Installation</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

</main>

<script src="../js/summary-ib.js"></script>

</body>
</html>
